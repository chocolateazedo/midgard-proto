# MediaMTX — servidor RTMP/WHIP/HLS
# Docs: https://github.com/bluenviron/mediamtx

# Auth externa: MediaMTX chama o Next.js para validar publish/read
authMethod: http
authHTTPAddress: https://midgard-proto.me/api/live/auth

# HLS
hlsAddress: :8888
hlsAllowOrigin: "*"
hlsSegmentCount: 6
hlsSegmentDuration: 5s

# WebRTC/WHIP (ingest do browser)
webrtcAddress: :8889

# RTMP (ingest do OBS — fallback)
rtmpAddress: :1935

# RTSP desabilitado
rtsp: no

# SRT desabilitado
srt: no

# Paths
paths:
  all:
    source: publisher
