# MediaMTX — servidor RTMP/WHIP/HLS
# Docs: https://github.com/bluenviron/mediamtx

# Auth externa: MediaMTX chama o Next.js para validar publish/read
authMethod: http
authHTTPAddress: https://midgard-proto.me/api/live/auth

# TLS
hlsEncryption: yes
hlsServerCert: /etc/letsencrypt/live/live.midgard-proto.me/fullchain.pem
hlsServerKey: /etc/letsencrypt/live/live.midgard-proto.me/privkey.pem

webrtcEncryption: yes
webrtcServerCert: /etc/letsencrypt/live/live.midgard-proto.me/fullchain.pem
webrtcServerKey: /etc/letsencrypt/live/live.midgard-proto.me/privkey.pem

# HLS
hlsAddress: :8888
hlsAllowOrigins: ["*"]
hlsSegmentCount: 7
hlsSegmentDuration: 5s
hlsVariant: fmp4

# WebRTC/WHIP (ingest do browser)
webrtcAddress: :8889

# RTMP (ingest do OBS — fallback)
rtmpAddress: :1935

# RTSP desabilitado
rtsp: no

# SRT desabilitado
srt: no

# WebRTC ICE — IP público da VPS + TCP mux (fallback se UDP bloqueado)
webrtcAdditionalHosts:
  - 85.31.230.86
webrtcLocalTCPAddress: :8189

# Paths
paths:
  all:
    source: publisher
