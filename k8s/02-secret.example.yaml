# TEMPLATE — NUNCA comitar a versão preenchida.
#
# Uso:
#   1. Copie este arquivo para k8s/secret.yaml (já está no .gitignore)
#   2. Preencha os valores com segredos reais
#   3. Aplique com: kubectl apply -f k8s/secret.yaml
#
# Alternativa recomendada (sem arquivo local):
#   kubectl create secret generic botfans-secrets -n botfans \
#     --from-literal=NEXTAUTH_SECRET='...' \
#     --from-literal=ENCRYPTION_SECRET='...' \
#     --from-literal=DATABASE_URL='postgresql://botfans:SENHA@botfans-postgres.xxxxx.sa-east-1.rds.amazonaws.com:5432/botfans?sslmode=require' \
#     --from-literal=NEXTAUTH_URL='https://bot.SEU-DOMINIO.com.br' \
#     --from-literal=SEED_OWNER_EMAIL='admin@SEU-DOMINIO.com.br' \
#     --from-literal=SEED_OWNER_PASSWORD='...' \
#     --from-literal=SEED_OWNER_NAME='Admin'

apiVersion: v1
kind: Secret
metadata:
  name: botfans-secrets
  namespace: botfans
type: Opaque
stringData:
  # NextAuth — gere com: openssl rand -base64 32
  NEXTAUTH_SECRET: "<gerar-32-bytes-base64>"
  NEXTAUTH_URL: "https://bot.SEU-DOMINIO.com.br"

  # AES-256-GCM — gere com: openssl rand -base64 32 (mínimo 32 chars)
  # IMPORTANTE: uma vez definido, NUNCA trocar em produção (quebra todos os tokens/keys criptografados no banco)
  ENCRYPTION_SECRET: "<gerar-32-bytes-base64>"

  # RDS Postgres — preencher com endpoint real depois de criar o RDS (ver AWS_SETUP)
  DATABASE_URL: "postgresql://botfans:<senha>@<endpoint>.sa-east-1.rds.amazonaws.com:5432/botfans?sslmode=require"

  # Owner inicial (usado uma vez pelo seed-job)
  SEED_OWNER_EMAIL: "admin@SEU-DOMINIO.com.br"
  SEED_OWNER_PASSWORD: "<senha-forte>"
  SEED_OWNER_NAME: "Admin"
