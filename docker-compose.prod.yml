services:
  workers:
    build: .
    restart: unless-stopped
    command: ["node", "--import", "tsx", "src/workers/index.ts"]
    env_file:
      - .env

  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
      - "8189:8189/udp"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - /etc/letsencrypt/live/live.midgard-proto.me:/certs:ro
